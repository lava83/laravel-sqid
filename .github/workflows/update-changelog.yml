name: "Update Changelog"

permissions:
  contents: write
  pull-requests: write

on:
  release:
    types: [released]

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main

      - name: Update Changelog
        uses: stefanzweifel/changelog-updater-action@a938690fad7edf25368f37e43a1ed1b34303eb36 # v1.12
        with:
          latest-version: ${{ github.event.release.name }}
          release-notes: ${{ github.event.release.body }}

      - name: Commit updated CHANGELOG
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.0
        with:
          branch: changelog/${{ github.event.release.tag_name }}
          create_branch: true
          commit_message: Update CHANGELOG
          file_pattern: CHANGELOG.md

      - name: Create Pull Request
        run: |
          gh pr create \
            --base main \
            --head "changelog/${{ github.event.release.tag_name }}" \
            --title "Update CHANGELOG for ${{ github.event.release.tag_name }}" \
            --body "Automated CHANGELOG update for release ${{ github.event.release.tag_name }}" \
          || gh pr edit "changelog/${{ github.event.release.tag_name }}" \
            --title "Update CHANGELOG for ${{ github.event.release.tag_name }}" \
            --body "Automated CHANGELOG update for release ${{ github.event.release.tag_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
